  <path d="M382,210 Q388,240 388,260 L412,260 Q412,240 418,210 Z" fill="url(#acc)" opacity="0.9"/>
  <rect x="390" y="255" width="20" height="5" rx="1" fill="#c8a96e" opacity="0.8"/>
