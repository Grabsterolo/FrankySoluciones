<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141210"/>
      <stop offset="100%" style="stop-color:#0d0e10"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8431a"/>
      <stop offset="100%" style="stop-color:#c03510"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Tile pattern background -->
  <g fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <!-- Row 1 -->
    <rect x="20" y="20" width="90" height="60"/><rect x="115" y="20" width="90" height="60"/>
    <rect x="210" y="20" width="90" height="60"/><rect x="305" y="20" width="90" height="60"/>
    <rect x="400" y="20" width="90" height="60"/><rect x="495" y="20" width="90" height="60"/>
    <rect x="590" y="20" width="90" height="60"/><rect x="685" y="20" width="95" height="60"/>
    <!-- Row 2 offset -->
    <rect x="20" y="85" width="90" height="60"/><rect x="115" y="85" width="90" height="60"/>
    <rect x="210" y="85" width="90" height="60"/><rect x="305" y="85" width="90" height="60"/>
    <rect x="400" y="85" width="90" height="60"/><rect x="495" y="85" width="90" height="60"/>
    <rect x="590" y="85" width="90" height="60"/><rect x="685" y="85" width="95" height="60"/>
    <!-- Row 3 -->
    <rect x="20" y="150" width="90" height="60"/><rect x="115" y="150" width="90" height="60"/>
    <rect x="210" y="150" width="90" height="60"/><rect x="305" y="150" width="90" height="60"/>
    <rect x="400" y="150" width="90" height="60"/><rect x="495" y="150" width="90" height="60"/>
    <rect x="590" y="150" width="90" height="60"/><rect x="685" y="150" width="95" height="60"/>
    <!-- Highlighted tiles -->
    <rect x="115" y="85" width="90" height="60" fill="#e8431a" fill-opacity="0.08" stroke="#e8431a" stroke-opacity="0.15"/>
    <rect x="305" y="20" width="90" height="60" fill="#e8431a" fill-opacity="0.06" stroke="#e8431a" stroke-opacity="0.1"/>
    <rect x="495" y="150" width="90" height="60" fill="#e8431a" fill-opacity="0.07" stroke="#e8431a" stroke-opacity="0.12"/>
  </g>
  <circle cx="400" cy="240" r="180" fill="#e8431a" fill-opacity="0.04"/>
  <!-- Icon -->
  <circle cx="400" cy="230" r="80" fill="#e8431a" fill-opacity="0.08" stroke="#e8431a" stroke-opacity="0.2" stroke-width="1"/>
  <g fill="url(#acc)" opacity="0.9">
    <rect x="365" y="195" width="32" height="32" rx="2"/>
    <rect x="403" y="195" width="32" height="32" rx="2"/>
    <rect x="365" y="233" width="32" height="32" rx="2"/>
    <rect x="403" y="233" width="32" height="32" rx="2"/>
  </g>
  <rect x="0" y="380" width="800" height="120" fill="#000000" fill-opacity="0.5"/>
  <text x="50" y="435" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="2">INSTALACIÓN DE PISOS</text>
  <text x="50" y="460" font-family="Arial, sans-serif" font-size="14" fill="#e8431a" letter-spacing="1">Cerámica · Porcelanato · Vinilo · Madera</text>
</svg>
