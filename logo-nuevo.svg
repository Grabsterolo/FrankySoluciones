<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Fondo degradado oscuro -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </radialGradient>

    <!-- Degradado rojo para acento -->
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>

    <!-- Degradado metálico -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bdc3c7"/>
      <stop offset="50%" stop-color="#ecf0f1"/>
      <stop offset="100%" stop-color="#95a5a6"/>
    </linearGradient>

    <!-- Sombra suave -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Glow rojo -->
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip circular -->
    <clipPath id="circleClip">
      <circle cx="250" cy="250" r="220"/>
    </clipPath>
  </defs>

  <!-- Fondo exterior suave -->
  <rect width="500" height="500" fill="#f0ece4"/>

  <!-- Anillo exterior decorativo -->
  <circle cx="250" cy="250" r="235" fill="none" stroke="#c0392b" stroke-width="2" opacity="0.4"/>
  <circle cx="250" cy="250" r="228" fill="none" stroke="#c0392b" stroke-width="0.5" opacity="0.3"/>

  <!-- Círculo principal -->
  <circle cx="250" cy="250" r="220" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Rayos decorativos de fondo (efecto sunburst) -->
  <g clip-path="url(#circleClip)" opacity="0.07">
    <line x1="250" y1="250" x2="250" y2="10"  stroke="white" stroke-width="18"/>
    <line x1="250" y1="250" x2="490" y2="250" stroke="white" stroke-width="18"/>
    <line x1="250" y1="250" x2="250" y2="490" stroke="white" stroke-width="18"/>
    <line x1="250" y1="250" x2="10"  y2="250" stroke="white" stroke-width="18"/>
    <line x1="250" y1="250" x2="406" y2="94"  stroke="white" stroke-width="12"/>
    <line x1="250" y1="250" x2="406" y2="406" stroke="white" stroke-width="12"/>
    <line x1="250" y1="250" x2="94"  y2="406" stroke="white" stroke-width="12"/>
    <line x1="250" y1="250" x2="94"  y2="94"  stroke="white" stroke-width="12"/>
    <line x1="250" y1="250" x2="330" y2="30"  stroke="white" stroke-width="8"/>
    <line x1="250" y1="250" x2="470" y2="330" stroke="white" stroke-width="8"/>
    <line x1="250" y1="250" x2="170" y2="470" stroke="white" stroke-width="8"/>
    <line x1="250" y1="250" x2="30"  y2="170" stroke="white" stroke-width="8"/>
    <line x1="250" y1="250" x2="170" y2="30"  stroke="white" stroke-width="8"/>
    <line x1="250" y1="250" x2="470" y2="170" stroke="white" stroke-width="8"/>
    <line x1="250" y1="250" x2="330" y2="470" stroke="white" stroke-width="8"/>
    <line x1="250" y1="250" x2="30"  y2="330" stroke="white" stroke-width="8"/>
  </g>

  <!-- Anillo interior decorativo -->
  <circle cx="250" cy="250" r="210" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.5"/>

  <!-- ==================== HERRAMIENTAS ==================== -->

  <!-- MARTILLO (arriba izquierda, ~-60°) -->
  <g transform="translate(250,250) rotate(-55) translate(0,-170)">
    <g transform="rotate(55)">
      <!-- mango -->
      <rect x="-4" y="10" width="8" height="45" rx="3" fill="url(#metalGrad)"/>
      <!-- cabeza -->
      <rect x="-14" y="-18" width="28" height="28" rx="4" fill="url(#metalGrad)"/>
      <rect x="-14" y="-18" width="8" height="28" rx="3" fill="#95a5a6"/>
    </g>
  </g>

  <!-- LLAVE INGLESA (arriba centro, ~-20°) -->
  <g transform="translate(250,250) rotate(-15) translate(0,-170)">
    <g transform="rotate(15)">
      <rect x="-5" y="-30" width="10" height="65" rx="4" fill="url(#metalGrad)"/>
      <ellipse cx="0" cy="-32" rx="14" ry="10" fill="none" stroke="url(#metalGrad)" stroke-width="7"/>
      <ellipse cx="0" cy="38" rx="10" ry="7" fill="none" stroke="url(#metalGrad)" stroke-width="6"/>
    </g>
  </g>

  <!-- BROCA / DESTORNILLADOR (arriba derecha, ~20°) -->
  <g transform="translate(250,250) rotate(20) translate(0,-170)">
    <g transform="rotate(-20)">
      <rect x="-4" y="-40" width="8" height="75" rx="3" fill="url(#metalGrad)"/>
      <polygon points="0,-55 -5,-42 5,-42" fill="#bdc3c7"/>
      <rect x="-8" y="30" width="16" height="12" rx="2" fill="#e74c3c"/>
    </g>
  </g>

  <!-- BROCHA / PINCEL (derecha superior, ~60°) -->
  <g transform="translate(250,250) rotate(60) translate(0,-170)">
    <g transform="rotate(-60)">
      <rect x="-5" y="-40" width="10" height="55" rx="3" fill="#e74c3c"/>
      <rect x="-10" y="15" width="20" height="8" rx="1" fill="#7f8c8d"/>
      <path d="M-10,23 Q-12,45 0,52 Q12,45 10,23 Z" fill="#bdc3c7"/>
    </g>
  </g>

  <!-- TALADRO (derecha, ~100°) -->
  <g transform="translate(250,250) rotate(100) translate(0,-165)">
    <g transform="rotate(-100)">
      <!-- cuerpo del taladro -->
      <rect x="-18" y="-15" width="36" height="26" rx="5" fill="#2c3e50"/>
      <rect x="-18" y="-15" width="36" height="26" rx="5" fill="none" stroke="#e74c3c" stroke-width="2"/>
      <!-- broca -->
      <rect x="17" y="-3" width="28" height="6" rx="2" fill="url(#metalGrad)"/>
      <!-- gatillo -->
      <path d="M-10,11 L-14,25 L-4,25 L0,11 Z" fill="#e74c3c"/>
      <!-- detalle -->
      <circle cx="-5" cy="0" r="5" fill="#e74c3c"/>
    </g>
  </g>

  <!-- RODILLO (abajo derecha, ~145°) -->
  <g transform="translate(250,250) rotate(145) translate(0,-165)">
    <g transform="rotate(-145)">
      <rect x="-3" y="-40" width="6" height="35" rx="3" fill="url(#metalGrad)"/>
      <rect x="-18" y="-5" width="36" height="16" rx="7" fill="#7f8c8d"/>
      <rect x="-16" y="-3" width="32" height="12" rx="5" fill="#95a5a6"/>
    </g>
  </g>

  <!-- LLAVE FIJA (abajo izquierda, ~215°) -->
  <g transform="translate(250,250) rotate(215) translate(0,-165)">
    <g transform="rotate(-215)">
      <rect x="-5" y="-35" width="10" height="65" rx="4" fill="url(#metalGrad)"/>
      <path d="M-15,-35 L15,-35 L10,-20 L-10,-20 Z" fill="url(#metalGrad)"/>
      <path d="M-12,-35 L-18,-20 L-10,-20 Z" fill="#95a5a6"/>
      <path d="M12,-35 L18,-20 L10,-20 Z" fill="#95a5a6"/>
    </g>
  </g>

  <!-- CUTTER / HERRAMIENTA (izquierda, ~260°) -->
  <g transform="translate(250,250) rotate(258) translate(0,-165)">
    <g transform="rotate(-258)">
      <rect x="-7" y="-40" width="14" height="70" rx="4" fill="#e74c3c"/>
      <rect x="-5" y="-42" width="10" height="15" rx="2" fill="url(#metalGrad)"/>
      <line x1="-7" y1="-10" x2="7" y2="-10" stroke="#c0392b" stroke-width="2"/>
      <line x1="-7" y1="0"   x2="7" y2="0"   stroke="#c0392b" stroke-width="2"/>
      <line x1="-7" y1="10"  x2="7" y2="10"  stroke="#c0392b" stroke-width="2"/>
    </g>
  </g>

  <!-- DESTORNILLADOR plano (arriba izquierda, ~-90°) -->
  <g transform="translate(250,250) rotate(-88) translate(0,-172)">
    <g transform="rotate(88)">
      <rect x="-3" y="-45" width="6" height="80" rx="2" fill="url(#metalGrad)"/>
      <rect x="-8" y="-47" width="16" height="6" rx="1" fill="#bdc3c7"/>
      <rect x="-6" y="30" width="12" height="18" rx="3" fill="#e74c3c"/>
    </g>
  </g>

  <!-- ==================== BANDA CENTRAL ==================== -->

  <!-- Banda roja diagonal decorativa -->
  <rect x="0" y="210" width="500" height="80" fill="url(#redGrad)" clip-path="url(#circleClip)" opacity="0.15"/>

  <!-- Panel central negro -->
  <rect x="70" y="198" width="360" height="108" rx="8" fill="#111820" opacity="0.92"/>
  <rect x="70" y="198" width="360" height="108" rx="8" fill="none" stroke="#c0392b" stroke-width="2"/>

  <!-- Línea roja superior del panel -->
  <rect x="70" y="198" width="360" height="5" rx="3" fill="url(#redGrad)"/>
  <!-- Línea roja inferior del panel -->
  <rect x="70" y="301" width="360" height="5" rx="3" fill="url(#redGrad)"/>

  <!-- Texto SOLUCIONES -->
  <text x="250" y="228"
        font-family="'Arial', sans-serif"
        font-size="18"
        font-weight="600"
        letter-spacing="10"
        fill="#bdc3c7"
        text-anchor="middle">SOLUCIONES</text>

  <!-- Texto FRANKY (principal) -->
  <text x="250" y="278"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="62"
        font-weight="900"
        letter-spacing="6"
        fill="white"
        text-anchor="middle"
        filter="url(#shadow)">FRANKY</text>

  <!-- Línea divisoria entre nombre y teléfono -->
  <line x1="120" y1="285" x2="380" y2="285" stroke="#c0392b" stroke-width="1" opacity="0.6"/>

  <!-- Texto teléfono -->
  <text x="250" y="300"
        font-family="'Arial', sans-serif"
        font-size="15"
        font-weight="400"
        letter-spacing="5"
        fill="#95a5a6"
        text-anchor="middle">8810 - 8590</text>

  <!-- ==================== DETALLES FINALES ==================== -->

  <!-- Puntos decorativos en los ejes -->
  <circle cx="250" cy="42"  r="4" fill="#c0392b" opacity="0.8"/>
  <circle cx="458" cy="250" r="4" fill="#c0392b" opacity="0.8"/>
  <circle cx="250" cy="458" r="4" fill="#c0392b" opacity="0.8"/>
  <circle cx="42"  cy="250" r="4" fill="#c0392b" opacity="0.8"/>

  <!-- Marcas de eje pequeñas -->
  <circle cx="250" cy="42"  r="2" fill="white" opacity="0.6"/>
  <circle cx="458" cy="250" r="2" fill="white" opacity="0.6"/>
  <circle cx="250" cy="458" r="2" fill="white" opacity="0.6"/>
  <circle cx="42"  cy="250" r="2" fill="white" opacity="0.6"/>

  <!-- Anillo interior sutil -->
  <circle cx="250" cy="250" r="130" fill="none" stroke="white" stroke-width="0.5" opacity="0.05"/>
</svg>
